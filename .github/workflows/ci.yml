name: CI Build & Security Checks

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["**"]

jobs:
    test:
        runs-on: ubuntu-latest
        env:
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "25.x"
                  cache: "npm"
            - run: npm ci
            - run: npm run test

    audit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "25.x"
                  cache: "npm"
            - run: npm audit
