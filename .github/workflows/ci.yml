name: CI Build & Security Checks

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["**"]

jobs:
    # Installs dependencies and runs the full test suite
    test:
        runs-on: ubuntu-latest
        env:
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

        steps:
            - uses: actions/checkout@v6.0.2
            - uses: actions/setup-node@v6.3.0
              with:
                  node-version: "25.x"
                  cache: "npm"
            - run: npm ci
            - run: npm run test

    # Scans dependencies for known vulnerabilities; fails on critical severity
    audit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6.0.2
            - uses: actions/setup-node@v6.3.0
              with:
                  node-version: "25.x"
                  cache: "npm"
            - run: npm audit --audit-level=critical

    # Runs Snyk to check for vulnerabilities and monitor the project
    snyk-monitor:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6.0.2
            - uses: actions/setup-node@v6.3.0
              with:
                  node-version: "25.x"
                  cache: "npm"
            - run: npm ci
            - uses: snyk/actions/node@master
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  args: --severity-threshold=critical
